name: Sync Email Draft to Mailchimp

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mailchimp-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (generates email HTML)
        run: npm run build

      - name: Sync email draft to Mailchimp
        run: node scripts/sync-mailchimp.js
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_LIST_ID }}
